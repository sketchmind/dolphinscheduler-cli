exclude: '^(.git/|.mypy_cache/|.venv/|build/|dist/)'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.2
    hooks:
      - id: ruff-check
        args: ["--fix", "--unsafe-fixes", "--output-format=full"]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: ["src"]
        pass_filenames: false
        additional_dependencies: [pytest>=8,<9, types-PyYAML>=6.0.12,<7]
  - repo: local
    hooks:
      - id: explicit-object-audit
        name: explicit object audit
        entry: python tools/check_explicit_object.py
        language: system
        pass_filenames: false
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: ["--toml", "pyproject.toml"]
